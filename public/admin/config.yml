backend:
  name: git-gateway
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: fiches
    label: Fiches d'exercices
    folder: src/content/fiches
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Titre, name: titre, widget: string }
      - { label: Pathologie, name: pathologie, widget: string }
      - label: Zone anatomique
        name: zone
        widget: select
        options: [dos, epaule, genou, cheville, pied, hanche, coude, poignet, cou, autre]
      - label: Niveau
        name: niveau
        widget: select
        options: [debutant, intermediaire, avance]
      - { label: "Duree estimee", name: duree, widget: string, required: false }
      - { label: Description courte, name: description, widget: text }
      - { label: Date de publication, name: pubDate, widget: datetime }
      - { label: Contenu, name: body, widget: markdown }
